<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mytube</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial,sans-serif;
  padding-bottom:70px;
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:#0f0f0f;
  padding:12px;
  border-bottom:1px solid #222;
}
.topbar{
  display:flex;
  align-items:center;
  gap:12px;
}
.logo{
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
}
.searchBox{
  flex:1;
  display:flex;
}
.searchBox input{
  flex:1;
  padding:11px;
  border:1px solid #333;
  background:#121212;
  color:white;
  border-radius:20px 0 0 20px;
  font-size:15px;
}
.searchBox button,.recommendBtn{
  padding:11px 16px;
  border:none;
  background:#2a2a2a;
  color:white;
  border-radius:0 20px 20px 0;
}
.recommendBtn{
  display:block;
  margin:12px auto 0;
  border-radius:20px;
  background:red;
}
.playerArea{
  display:none;
  padding:14px;
}
.playerArea.active{display:block}
iframe{
  width:100%;
  height:520px;
  border:0;
  border-radius:14px;
  background:black;
}
#nowTitle{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
.sectionTitle{
  margin:15px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:18px;
  padding:15px;
}
.card{
  cursor:pointer;
}
.card img{
  width:100%;
  border-radius:12px;
  background:#222;
}
.cardTitle{
  margin-top:8px;
  font-size:14px;
  line-height:1.4;
}
.channelName{
  color:#aaa;
  font-size:13px;
  margin-top:5px;
}
.channelName:hover{color:white}
.badge{
  display:inline-block;
  margin-top:6px;
  padding:4px 8px;
  background:red;
  border-radius:10px;
  font-size:12px;
}
.shortsView{
  display:none;
  height:calc(100vh - 125px);
  overflow-y:scroll;
  scroll-snap-type:y mandatory;
}
.shortsView.active{display:block}
.shortItem{
  height:calc(100vh - 125px);
  scroll-snap-align:start;
  display:flex;
  justify-content:center;
  align-items:center;
}
.shortBox{
  width:340px;
  height:600px;
  max-width:95vw;
  max-height:82vh;
  border-radius:22px;
  overflow:hidden;
  background:black;
}
.shortBox iframe{
  width:100%;
  height:100%;
  border-radius:22px;
}
.historyBox{
  display:none;
  padding:18px;
}
.historyBox.active{display:block}
.historyItem{
  padding:13px;
  background:#1f1f1f;
  border-radius:12px;
  margin-bottom:10px;
}
.bottomNav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:#111;
  border-top:1px solid #333;
  display:flex;
  justify-content:space-around;
  z-index:999;
}
.bottomNav button{
  flex:1;
  background:none;
  border:none;
  color:white;
  font-size:13px;
}
@media(max-width:700px){
  iframe{height:240px}
  .grid{grid-template-columns:repeat(2,1fr);gap:14px;padding:10px}
  .cardTitle{font-size:13px}
}
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="logo" onclick="showHome()">Mytube</div>
    <div class="searchBox">
      <input id="searchInput" placeholder="検索">
      <button onclick="searchVideos()">検索</button>
    </div>
  </div>
  <button class="recommendBtn" onclick="loadRecommended()">おすすめを更新</button>
</header>

<section id="playerArea" class="playerArea">
  <div id="playerBox"></div>
  <div id="nowTitle"></div>
</section>

<h2 id="sectionTitle" class="sectionTitle">おすすめ</h2>
<section id="videoGrid" class="grid"></section>
<section id="historyBox" class="historyBox"></section>
<section id="shortsView" class="shortsView"></section>

<nav class="bottomNav">
  <button onclick="showHome()">ホーム</button>
  <button onclick="showShorts()">Shorts</button>
  <button onclick="showHistory()">履歴</button>
</nav>

<script>
const API_KEY = "AIzaSyBf5AkiXVgmQQwiP9HlfG3MzvUgIlR2vYI";

let videos = [];
let shorts = [];

window.onload = () => loadRecommended();

function setCookie(name,value,days=30){
  const d = new Date();
  d.setTime(d.getTime() + days*24*60*60*1000);
  document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + ";expires=" + d.toUTCString() + ";path=/";
}

function getCookie(name){
  const target = name + "=";
  const arr = document.cookie.split(";");
  for(let c of arr){
    c = c.trim();
    if(c.indexOf(target) === 0){
      try{return JSON.parse(decodeURIComponent(c.substring(target.length)))}
      catch(e){return []}
    }
  }
  return [];
}

function saveSearch(word){
  let h = getCookie("searchHistory");
  h = h.filter(x => x !== word);
  h.unshift(word);
  setCookie("searchHistory", h.slice(0,10));
}

function saveWatch(video){
  let w = getCookie("watchData");
  w.unshift(video.title + " " + video.channelTitle);
  setCookie("watchData", w.slice(0,25));
}

function recommendWord(){
  const h = getCookie("searchHistory").join(" ");
  const w = getCookie("watchData").join(" ");
  return (w + " " + h).trim() || "人気 動画 音楽 ゲーム shorts";
}

function hideAll(){
  document.getElementById("videoGrid").style.display = "none";
  document.getElementById("historyBox").classList.remove("active");
  document.getElementById("shortsView").classList.remove("active");
}

function showHome(){
  hideAll();
  document.getElementById("sectionTitle").style.display = "block";
  document.getElementById("videoGrid").style.display = "grid";
  loadRecommended();
}

function loadRecommended(){
  document.getElementById("sectionTitle").textContent = "おすすめ";
  fetchVideos(recommendWord());
}

function searchVideos(){
  const q = document.getElementById("searchInput").value.trim();
  if(!q) return alert("検索ワードを入力してね");
  saveSearch(q);
  hideAll();
  document.getElementById("sectionTitle").style.display = "block";
  document.getElementById("sectionTitle").textContent = "検索結果：" + q;
  document.getElementById("videoGrid").style.display = "grid";
  fetchVideos(q + " shorts");
}

async function fetchVideos(query){
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = "<p>読み込み中...</p>";

  const url =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&safeSearch=moderate&maxResults=30&q="
    + encodeURIComponent(query) + "&key=" + API_KEY;

  try{
    const res = await fetch(url);
    const data = await res.json();

    if(data.error){
      grid.innerHTML = "<p>APIエラー：" + data.error.message + "</p>";
      return;
    }

    videos = [];
    shorts = [];
    grid.innerHTML = "";

    data.items.forEach(item=>{
      const v = {
        videoId:item.id.videoId,
        title:item.snippet.title,
        channelTitle:item.snippet.channelTitle,
        channelId:item.snippet.channelId,
        thumb:item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default.url,
        isShort:item.snippet.title.toLowerCase().includes("shorts") || item.snippet.title.includes("ショート") || item.snippet.title.includes("#shorts")
      };

      videos.push(v);
      if(v.isShort) shorts.push(v);

      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${v.thumb}">
        <div class="cardTitle">${v.title}</div>
        <div class="channelName">${v.channelTitle}</div>
        ${v.isShort ? '<span class="badge">Shorts</span>' : ''}
      `;

      card.onclick = () => playVideo(v);
      card.querySelector(".channelName").onclick = e => openChannel(e,v.channelTitle,v.channelId);

      grid.appendChild(card);
    });

    if(shorts.length === 0) shorts = videos;

  }catch(e){
    grid.innerHTML = "<p>読み込みに失敗しました</p>";
  }
}

function playVideo(v){
  saveWatch(v);
  document.getElementById("playerArea").classList.add("active");
  document.getElementById("playerBox").innerHTML = `
    <iframe
      src="https://www.youtube.com/embed/${v.videoId}?rel=0&autoplay=1&playsinline=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  `;
  document.getElementById("nowTitle").textContent = v.title;
  window.scrollTo({top:0,behavior:"smooth"});
}

async function openChannel(e,name,id){
  e.stopPropagation();
  hideAll();
  document.getElementById("sectionTitle").style.display = "block";
  document.getElementById("sectionTitle").textContent = name;
  document.getElementById("videoGrid").style.display = "grid";
  fetchVideosFromChannel(id);
}

async function fetchVideosFromChannel(id){
  const grid = document.getElementById("videoGrid");
  grid.innerHTML = "<p>読み込み中...</p>";

  const url =
    "https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&order=date&maxResults=30&channelId="
    + id + "&key=" + API_KEY;

  const res = await fetch(url);
  const data = await res.json();
  grid.innerHTML = "";

  data.items.forEach(item=>{
    const v = {
      videoId:item.id.videoId,
      title:item.snippet.title,
      channelTitle:item.snippet.channelTitle,
      channelId:item.snippet.channelId,
      thumb:item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default.url,
      isShort:false
    };

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img src="${v.thumb}"><div class="cardTitle">${v.title}</div><div class="channelName">${v.channelTitle}</div>`;
    card.onclick = () => playVideo(v);
    grid.appendChild(card);
  });
}

function showHistory(){
  hideAll();
  document.getElementById("sectionTitle").style.display = "none";
  const box = document.getElementById("historyBox");
  box.classList.add("active");

  const h = getCookie("searchHistory");
  if(h.length === 0){
    box.innerHTML = "<h2>検索履歴なし</h2>";
    return;
  }

  box.innerHTML = "<h2>検索履歴</h2>";
  h.forEach(word=>{
    const div = document.createElement("div");
    div.className = "historyItem";
    div.textContent = word;
    div.onclick = () => {
      document.getElementById("searchInput").value = word;
      searchVideos();
    };
    box.appendChild(div);
  });
}

function showShorts(){
  hideAll();
  document.getElementById("sectionTitle").style.display = "none";

  const view = document.getElementById("shortsView");
  view.classList.add("active");
  view.innerHTML = "";

  if(shorts.length === 0){
    fetchVideos("shorts 人気").then(()=>showShorts());
    return;
  }

  shorts.forEach(v=>{
    const item = document.createElement("div");
    item.className = "shortItem";
    item.innerHTML = `
      <div class="shortBox">
        <iframe
          src="https://www.youtube.com/embed/${v.videoId}?rel=0&playsinline=1"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
        </iframe>
      </div>
    `;
    view.appendChild(item);
  });
}

document.getElementById("searchInput").addEventListener("keydown",e=>{
  if(e.key==="Enter") searchVideos();
});
</script>

</body>
</html>
